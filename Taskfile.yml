version: "3"

vars:
  WEB_DIR: apps/web
  NLP_DIR: apps/nlp_service
  DEFAULT_DOPPLER_PROJECT: lexiflix_web
  DEFAULT_DOPPLER_CONFIG: dev

tasks:
  nlp:dev:
    desc: Run the NLP service locally with auto-reload
    dir: "{{.NLP_DIR}}"
    cmds:
      - NLP_DEBUG=true uv run uvicorn app.main:app --reload

  nlp:lint:
    desc: Lint the NLP service with Ruff
    dir: "{{.NLP_DIR}}"
    cmds:
      - uv run --extra dev ruff check .

  nlp:format:
    desc: Format the NLP service with Ruff
    dir: "{{.NLP_DIR}}"
    cmds:
      - uv run --extra dev ruff format .

  nlp:typecheck:
    desc: Typecheck the NLP service with BasedPyright
    dir: "{{.NLP_DIR}}"
    cmds:
      - uv run --extra dev basedpyright

  nlp:docker:build:
    desc: Build the NLP service container for local testing
    dir: "{{.NLP_DIR}}"
    vars:
      IMAGE_NAME: '{{default "lexiflix-nlp-service" .IMAGE_NAME}}'
    cmds:
      - docker build --build-arg UV_HTTP_TIMEOUT=120 -t "{{.IMAGE_NAME}}" .

  nlp:docker:run:
    desc: Run the NLP service container locally
    vars:
      IMAGE_NAME: '{{default "lexiflix-nlp-service" .IMAGE_NAME}}'
      PORT: '{{default "8000" .PORT}}'
    cmds:
      - docker run --rm --name lexiflix-nlp-service -p "{{.PORT}}:8000" "{{.IMAGE_NAME}}"

  web:dev:
    desc: Run the Next.js web app locally
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default .DEFAULT_DOPPLER_CONFIG}}'
    env:
      DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
      DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
    cmds:
      - |
          CLEAN_NODE_OPTIONS="$(printf '%s' "${NODE_OPTIONS:-}" | sed -E 's/(^| )--localstorage-file(=[^ ]*)?( |$)/ /g' | xargs)"
          LOCALSTORAGE_FILE="${PWD}/.trigger/localstorage.json"
          mkdir -p "$(dirname "${LOCALSTORAGE_FILE}")" "${PWD}/.trigger/tmp/store"
          FINAL_NODE_OPTIONS="$(printf '%s %s' "${CLEAN_NODE_OPTIONS}" "--localstorage-file=${LOCALSTORAGE_FILE}" | xargs)"
          doppler run --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" -- env NODE_OPTIONS="${FINAL_NODE_OPTIONS}" pnpm dev

  web:lint:
    desc: Lint the web app with Biome
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm lint

  web:format:
    desc: Format the web app with Biome
    dir: "{{.WEB_DIR}}"
    cmds:
      - pnpm format

  web:typecheck:
    desc: Typecheck the web app
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default .DEFAULT_DOPPLER_CONFIG}}'
    env:
      DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
      DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
    cmds:
      - doppler run --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" -- pnpm tsc

  web:build:
    desc: Build the web app
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default .DEFAULT_DOPPLER_CONFIG}}'
    env:
      DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
      DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
    cmds:
      - doppler run --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" -- pnpm build

  web:trigger:dev:
    desc: Run the Trigger.dev worker for the web app locally
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default .DEFAULT_DOPPLER_CONFIG}}'
    env:
      DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
      DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
    cmds:
      - |
          CLEAN_NODE_OPTIONS="$(printf '%s' "${NODE_OPTIONS:-}" | sed -E 's/(^| )--localstorage-file(=[^ ]*)?( |$)/ /g' | xargs)"
          LOCALSTORAGE_FILE="${PWD}/.trigger/localstorage.json"
          mkdir -p "$(dirname "${LOCALSTORAGE_FILE}")" "${PWD}/.trigger/tmp/store"
          FINAL_NODE_OPTIONS="$(printf '%s %s' "${CLEAN_NODE_OPTIONS}" "--localstorage-file=${LOCALSTORAGE_FILE}" | xargs)"
          doppler run --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" -- env NODE_OPTIONS="${FINAL_NODE_OPTIONS}" pnpm trigger:dev

  web:trigger:deploy:
    desc: Deploy Trigger.dev tasks using environment variables from Doppler
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default .DEFAULT_DOPPLER_CONFIG}}'
    env:
      DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
      DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
    cmds:
      - doppler run --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" -- pnpm trigger:deploy

  web:trigger:deploy:prod:
    desc: Deploy Trigger.dev tasks for production environment using prd Doppler config
    cmds:
      - task: web:trigger:deploy
        vars:
          DOPPLER_PROJECT: "lexiflix_web"
          DOPPLER_CONFIG: "prd"

  vercel:web:sync-envs:
    desc: Sync required apps/web env vars from Doppler into a Vercel environment
    dir: "{{.WEB_DIR}}"
    vars:
      DOPPLER_PROJECT: '{{.DOPPLER_PROJECT | default .DEFAULT_DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{.DOPPLER_CONFIG | default "prd"}}'
      VERCEL_ENV: '{{default "preview" .VERCEL_ENV}}'
      VERCEL_GIT_BRANCH: '{{default "dev" .VERCEL_GIT_BRANCH}}'
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "Doppler CLI is required. Install it before running this task."
      - sh: command -v vercel >/dev/null 2>&1
        msg: "Vercel CLI is required. Install it before running this task."
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required. Install it before running this task."
      - sh: test -f .vercel/project.json
        msg: "apps/web is not linked to Vercel yet. Run: task vercel:web:link"
    cmds:
      - |
          set -euo pipefail

          echo "Fetching secrets from Doppler..."
          secrets_json="$(doppler secrets --project "{{.DOPPLER_PROJECT}}" --config "{{.DOPPLER_CONFIG}}" --json)"

          for key in $(echo "${secrets_json}" | jq -r 'keys[]'); do
            case "${key}" in
              DOPPLER_CONFIG|DOPPLER_ENVIRONMENT|DOPPLER_PROJECT)
                continue
                ;;
            esac

            echo "Syncing ${key} -> {{.VERCEL_ENV}}"
            value="$(echo "${secrets_json}" | jq -r --arg k "${key}" '.[$k].computed')"
            cmd=(vercel env add "${key}" "{{.VERCEL_ENV}}")
            if [ "{{.VERCEL_ENV}}" = "preview" ]; then
              cmd+=("{{.VERCEL_GIT_BRANCH}}")
            fi
            cmd+=(--value "${value}" --force --yes --non-interactive)

            if ! "${cmd[@]}" < /dev/null; then
              echo "Failed syncing ${key} to Vercel environment '{{.VERCEL_ENV}}'."
              exit 1
            fi
          done

          if [ "{{.VERCEL_ENV}}" = "preview" ]; then
            echo "Synced apps/web env vars from Doppler config '{{.DOPPLER_CONFIG}}' to Vercel environment '{{.VERCEL_ENV}}' for branch '{{.VERCEL_GIT_BRANCH}}'."
          else
            echo "Synced apps/web env vars from Doppler config '{{.DOPPLER_CONFIG}}' to Vercel environment '{{.VERCEL_ENV}}'."
          fi

  vercel:web:sync-envs:prod:
    desc: Sync required apps/web env vars from Doppler into the Vercel production environment
    vars:
      DOPPLER_PROJECT: '{{default "lexiflix_web" .DOPPLER_PROJECT}}'
      DOPPLER_CONFIG: '{{default "prd" .DOPPLER_CONFIG}}'
      VERCEL_ENV: production
    cmds:
      - task: vercel:web:sync-envs
        vars:
          DOPPLER_PROJECT: "{{.DOPPLER_PROJECT}}"
          DOPPLER_CONFIG: "{{.DOPPLER_CONFIG}}"
          VERCEL_ENV: "{{.VERCEL_ENV}}"
