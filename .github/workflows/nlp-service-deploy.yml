name: Build & Deploy NLP Service

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/nlp_service/**"
      - ".github/workflows/nlp-service-image.yml"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  AR_REPOSITORY: lexiflix-nlp
  IMAGE_NAME: lexiflix-nlp-service
  SERVICE_NAME: lexiflix-nlp

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Artifact Registry
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nlp_service
          file: ./apps/nlp_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            SPACY_MODEL=en_core_web_trf
            UV_HTTP_TIMEOUT=120
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          env_vars: |
            NLP_SPACY_PREFER_TRANSFORMER=true
            NLP_LOG_LEVEL=info
          cpu: 2
          memory: 4Gi
          timeout: 300s
          flags: '--allow-unauthenticated --port=8000'
