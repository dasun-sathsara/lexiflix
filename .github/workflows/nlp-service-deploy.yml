name: Build & Deploy NLP Service (Azure)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/nlp_service/**"
      - ".github/workflows/nlp-service-deploy.yml"
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: lexiflix-rg
  AZURE_CONTAINER_APP_ENV: lexiflix-aca-env
  AZURE_APP_NAME: lexiflix-nlp
  IMAGE_NAME: lexiflix-nlp-service

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.AZURE_REGISTRY_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Azure Container Registry
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nlp_service
          file: ./apps/nlp_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            UV_HTTP_TIMEOUT=120
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            --set-env-vars "NLP_API_KEY=${{ secrets.NLP_SERVICE_API_KEY }}" "NLP_LOG_LEVEL=info"
